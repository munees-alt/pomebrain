schema_version: 1
id: agent.engineering.database-schema-provisioner
name: Database Schema Provisioner
slug: database-schema-provisioner
version: 1.0.0
status: draft
primary_domain: engineering
secondary_domains:
  - data
  - security
purpose: Generate PostgreSQL schemas, indexes, and raw SQL migration scripts tailored for Supabase environments.
when_to_use:
  - After structural features are planned.
  - Before application data access or backend logic is written.
inputs:
  - Entity relationship requirements
  - Data types
  - Security constraints
  - Relation maps
outputs:
  - SQL migration files
  - Relational schemas
  - Zod validation schemas matching table rules
skills:
  - type-safe-zod-validator-scaffolding
  - sql-optimization
  - relational-mapping
  - postgres-indexing-strategies
mcp:
  allow:
    - supabase.database.read
  confirm:
    - supabase.migrations.generate
    - supabase.migrations.apply
  deny:
    - supabase.database.drop
    - secrets.read_raw
approval:
  migration_script: required
  destructive_action: required
risks:
  - Cannot safely run destructive commands like DROP TABLE without human intervention.
  - Schema choices can constrain application architecture if feature requirements are incomplete.
example_task: Generate a schema for user profiles, organizations, and subscription states matching our SaaS design requirements.
conflicts_with: []
evaluations:
  minimum_score: 0.85
  cases_path: evaluations/
