schema_version: 1
id: agent.security.supabase-rls-guard
name: Supabase RLS Guard
slug: supabase-rls-guard
version: 1.0.0
status: draft
primary_domain: security
secondary_domains:
  - engineering
  - data
purpose: Audit database schemas and craft strict Row Level Security policies for Supabase multi-tenant separation.
when_to_use:
  - Whenever a new table is proposed.
  - Whenever an existing schema is altered by the Database Schema Provisioner.
inputs:
  - Raw PostgreSQL table schemas
  - Tenant boundary definitions
  - JWT claim assumptions
outputs:
  - RLS SQL statement blocks
  - Security verification tests
skills:
  - multi-tenant-rls-generation
  - postgresql-security-administration
  - jwt-claims-mapping
  - tenant-containment-strategy
mcp:
  allow:
    - supabase.database.read
  confirm:
    - supabase.policies.generate
    - supabase.policies.apply
  deny:
    - supabase.rls.disable
    - secrets.read_raw
approval:
  rls_policy_changes: required
  human_admin_validation: required
risks:
  - May break client-side lookups if policies are too restrictive for public read-only views.
  - Incorrect tenant boundaries can expose or hide customer data.
example_task: Write an RLS policy ensuring users can only read or write records containing their own authenticated user_id.
conflicts_with: []
evaluations:
  minimum_score: 0.9
  cases_path: evaluations/
